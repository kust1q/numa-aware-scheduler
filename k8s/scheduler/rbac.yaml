apiVersion: v1
kind: ServiceAccount
metadata:
  name: numa-aware-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: numa-aware-scheduler-as-kube-scheduler
subjects:
- kind: ServiceAccount
  name: numa-aware-scheduler
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: system:kube-scheduler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: numa-aware-scheduler-as-volume-scheduler
subjects:
- kind: ServiceAccount
  name: numa-aware-scheduler
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: system:volume-scheduler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: numa-aware-scheduler-topology
rules:
  - apiGroups: ["topology.numa-aware-scheduler.io"]
    resources: ["numatopologies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: numa-aware-scheduler-topology
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: numa-aware-scheduler-topology
subjects:
  - kind: ServiceAccount
    name: numa-aware-scheduler
    namespace: kube-system
